<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>racing3d - 3D 賽車遊戲</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{overflow:hidden;background:#0a0a0a;font-family:system-ui,-apple-system,sans-serif}
    #loading{position:fixed;top:0;left:0;width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;z-index:999;background:#0a0a0a}
    #loading h1{font-size:3rem;margin-bottom:1rem}
    #loading p{font-size:1.2rem;margin-bottom:0.5rem}
    #loading .progress{width:300px;height:8px;background:#333;border-radius:4px;overflow:hidden;margin-top:1rem}
    #loading .progress-bar{height:100%;background:#00ff88;width:0%;transition:width 0.2s}
    #hud{position:fixed;top:20px;left:20px;color:#fff;z-index:100;pointer-events:none}
    #hud .speed{font-size:2rem;font-weight:bold;text-shadow:0 0 10px rgba(0,0,0,0.8)}
    #hud .controls{font-size:1rem;margin-top:0.5rem;opacity:0.8}
    canvas{display:block;width:100vw;height:100vh}
  </style>
</head>
<body>
  <div id="loading">
    <h1>racing3d</h1>
    <p>一款使用 Three.js 打造的 3D 賽車遊戲</p>
    <p>使用方向鍵 ↑↓←→ 操控車輛</p>
    <div class="progress">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>

  <div id="hud">
    <div class="speed" id="speed">0 km/h</div>
    <div class="controls">↑ 加速 | ↓ 剎車/倒車 | ←→ 轉向</div>
  </div>

  <!-- Three.js 核心依賴 -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>

  <script>
    // ==================== 場景與基礎設定 ====================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a0a);
    scene.fog = new THREE.Fog(0x0a0a0a, 20, 200);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 12);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // ==================== 燈光系統 ====================
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(50, 100, 50);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 4096;
    dirLight.shadow.mapSize.height = 4096;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 500;
    dirLight.shadow.camera.left = -100;
    dirLight.shadow.camera.right = 100;
    dirLight.shadow.camera.top = 100;
    dirLight.shadow.camera.bottom = -100;
    scene.add(dirLight);

    // ==================== 賽道與地面 ====================
    // 主地面
    const groundGeometry = new THREE.PlaneGeometry(500, 500);
    const groundMaterial = new THREE.MeshStandardMaterial({ 
      color: 0x222222, 
      roughness: 0.9,
      metalness: 0.1
    });
    const ground = new THREE.Mesh(groundGeometry, groundMaterial);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // 賽道路徑（簡易環形賽道）
    const trackGeometry = new THREE.PlaneGeometry(200, 20);
    const trackMaterial = new THREE.MeshStandardMaterial({ 
      color: 0x333333, 
      roughness: 0.8,
      metalness: 0.2
    });
    const track = new THREE.Mesh(trackGeometry, trackMaterial);
    track.rotation.x = -Math.PI / 2;
    track.position.set(0, 0.01, 0);
    track.receiveShadow = true;
    scene.add(track);

    // 賽道標線
    const lineGeometry = new THREE.PlaneGeometry(200, 0.5);
    const lineMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff });
    const centerLine = new THREE.Mesh(lineGeometry, lineMaterial);
    centerLine.rotation.x = -Math.PI / 2;
    centerLine.position.set(0, 0.02, 0);
    scene.add(centerLine);

    // ==================== 車輛與物理控制 ====================
    let car, carBody, wheels = [];
    const keys = {};
    let speed = 0;
    let steer = 0;
    const maxSpeed = 200;
    const acceleration = 0.8;
    const brake = 1.2;
    const friction = 0.98;
    const steerSpeed = 0.05;
    const maxSteer = 0.08;

    // 載入真實跑車模型（地平線5風格超跑）
    const loader = new THREE.GLTFLoader();
    loader.load(
      'https://threejs.org/examples/models/gltf/ferrari.glb',
      (gltf) => {
        car = gltf.scene;
        car.scale.set(0.5, 0.5, 0.5);
        car.position.set(0, 0.5, 0);
        car.traverse(obj => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = false;
          }
          // 識別車輪（用於轉向動畫）
          if (obj.name.includes('wheel') || obj.name.includes('tire')) {
            wheels.push(obj);
          }
        });
        carBody = car.getObjectByName('body') || car;
        scene.add(car);
        // 隱藏載入畫面
        document.getElementById('loading').style.display = 'none';
      },
      (xhr) => {
        const progress = (xhr.loaded / xhr.total) * 100;
        document.getElementById('progressBar').style.width = `${progress}%`;
        console.log(`載入進度: ${progress.toFixed(1)}%`);
      },
      (err) => {
        console.error('模型載入失敗', err);
        document.getElementById('loading').innerHTML = '<p>載入失敗，請刷新頁面重試</p>';
      }
    );

    // 鍵盤事件監聽
    document.addEventListener('keydown', (e) => {
      keys[e.key] = true;
    });
    document.addEventListener('keyup', (e) => {
      keys[e.key] = false;
    });

    // 相機跟隨車輛
    const followCamera = new THREE.Vector3();
    const cameraOffset = new THREE.Vector3(0, 4, 8);

    // ==================== 動畫循環 ====================
    function animate() {
      requestAnimationFrame(animate);

      // 車輛控制邏輯
      if (car) {
        // 加速/剎車
        if (keys['ArrowUp']) {
          speed += acceleration;
        } else if (keys['ArrowDown']) {
          speed -= brake;
        } else {
          speed *= friction;
        }

        // 速度限制
        speed = Math.max(-maxSpeed / 2, Math.min(maxSpeed, speed));

        // 轉向
        if (keys['ArrowLeft']) {
          steer = Math.min(maxSteer, steer + steerSpeed);
        } else if (keys['ArrowRight']) {
          steer = Math.max(-maxSteer, steer - steerSpeed);
        } else {
          steer *= 0.8;
        }

        // 更新車輛位置與旋轉
        car.rotation.y += steer * (Math.abs(speed) / maxSpeed);
        const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(car.quaternion);
        car.position.add(forward.multiplyScalar(speed * 0.01));

        // 車輪轉向動畫
        wheels.forEach(wheel => {
          if (wheel.name.includes('front')) {
            wheel.rotation.y = steer * 0.5;
          }
          wheel.rotation.x += speed * 0.01;
        });

        // 更新HUD速度顯示
        const displaySpeed = Math.abs(Math.round(speed * 1.8));
        document.getElementById('speed').textContent = `${displaySpeed} km/h`;

        // 相機跟隨
        followCamera.copy(car.position).add(cameraOffset.clone().applyQuaternion(car.quaternion));
        camera.position.lerp(followCamera, 0.1);
        camera.lookAt(car.position);
      }

      renderer.render(scene, camera);
    }
    animate();

    // ==================== 視窗自適應 ====================
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
